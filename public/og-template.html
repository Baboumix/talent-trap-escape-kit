<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: #0B0A0B;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(135deg, #FE6C63, #FF8A54);
  }
  .content {
    text-align: center; max-width: 900px; padding: 40px;
  }
  .surtitre {
    font-size: 14px; letter-spacing: 4px; color: #FE6C63;
    text-transform: uppercase; font-weight: 700; margin-bottom: 24px;
  }
  h1 {
    font-size: 64px; font-weight: 800; color: #ffffff; line-height: 1.1;
    margin-bottom: 20px;
  }
  h1 .coral {
    background: linear-gradient(135deg, #FE6C63, #FF8A54);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .sub {
    font-size: 24px; color: #949dad; line-height: 1.5; margin-bottom: 32px;
  }
  .badge {
    display: inline-block;
    background: #FE6C63; color: #fff;
    padding: 12px 32px; border-radius: 20px;
    font-size: 18px; font-weight: 600;
  }
  .footer {
    position: absolute; bottom: 24px; left: 0; right: 0;
    text-align: center; font-size: 14px; color: #6b7280;
  }
  .logo {
    position: absolute; bottom: 24px; right: 32px;
    font-size: 16px; color: #FE6C63; font-weight: 700;
  }
</style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="content">
    <div class="surtitre">TALENT TRAP ESCAPE KIT</div>
    <h1>Ton talent te <span class="coral">propulse</span> ou te <span class="coral">piege</span> ?</h1>
    <div class="sub">3 modules pour diagnostiquer, cartographier et trouver ta direction.</div>
    <div class="badge">Faire mon check-up gratuit</div>
  </div>
  <div class="footer">Base sur les Six Besoins Humains Essentiels · Robbins-Madanes Training</div>
  <div class="logo">monexpansion.com</div>
</body>
</html>
